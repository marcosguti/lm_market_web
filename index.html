<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LM Market - Tu supermercado de confianza. Productos de excelente calidad al mejor precio. Encuentra todo lo que necesitas para tu hogar en Tovar, Mérida."
    />
    <meta
      name="keywords"
      content="supermercado, LM Market, compras, productos, calidad, precios bajos, Tovar, Mérida, Venezuela"
    />
    <meta name="author" content="LM Market" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Spanish" />
    <meta name="geo.region" content="VE-M" />
    <meta name="geo.placename" content="Tovar, Mérida" />
    <link rel="canonical" href="https://www.lmmarket.com" />
    <title>LM Market - Calidad al mejor precio</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #97bd11;
      }
      #initial-loader-container {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #97bd11;
      }
      .initial-loader {
        position: relative;
        flex-shrink: 0;
        width: 170px;
        height: 170px;
        max-width: none;
        max-height: none;
      }
      .initial-loader-logo-wrapper {
        position: absolute;
        top: 10px;
        left: 10px;
        width: 150px;
        height: 150px;
        max-width: none;
        max-height: none;
        border-radius: 50%;
        background-color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        z-index: 1;
      }
      .initial-loader-logo {
        height: 110px;
        width: auto;
        max-width: none;
      }
      .initial-loader-spinner {
        position: absolute;
        top: 0;
        left: 0;
        width: 170px;
        height: 170px;
        max-width: none;
        max-height: none;
        box-sizing: border-box;
        border-radius: 50%;
        border: 6px solid rgba(255, 255, 255, 0.4);
        border-top-color: rgba(255, 255, 255, 0.95);
        border-right-color: rgba(255, 255, 255, 0.7);
        animation: initial-loader-spin 1.1s linear infinite;
        pointer-events: none;
      }
      @keyframes initial-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader-container">
      <div class="initial-loader">
        <div class="initial-loader-spinner" aria-hidden="true"></div>
        <div class="initial-loader-logo-wrapper">
          <img src="/logo.png" alt="LM Market" class="initial-loader-logo" />
        </div>
      </div>
    </div>
    <div id="root" style="display: none"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
