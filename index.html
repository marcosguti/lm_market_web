<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LM Market - Tu supermercado de confianza. Productos de excelente calidad al mejor precio. Encuentra todo lo que necesitas para tu hogar en Tovar, Mérida."
    />
    <meta
      name="keywords"
      content="supermercado, LM Market, compras, productos, calidad, precios bajos, Tovar, Mérida, Venezuela"
    />
    <meta name="author" content="LM Market" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Spanish" />
    <meta name="geo.region" content="VE-M" />
    <meta name="geo.placename" content="Tovar, Mérida" />
    <link rel="canonical" href="https://www.lmmarket.com" />
    <title>LM Market - Calidad al mejor precio</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #97bd11;
      }
      #initial-loader-container {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #97bd11;
      }
      .initial-loader {
        position: relative;
        flex-shrink: 0;
        width: 150px;
        height: 150px;
        max-width: none;
        max-height: none;
        animation:
          initial-loader-in 450ms ease-out both,
          initial-loader-breathe 1.8s ease-in-out 450ms infinite alternate;
      }
      .initial-loader-logo-wrapper {
        width: 150px;
        height: 150px;
        max-width: none;
        max-height: none;
        border-radius: 50%;
        background-color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      }
      .initial-loader-logo {
        height: 110px;
        width: auto;
        max-width: none;
      }
      @keyframes initial-loader-in {
        from {
          opacity: 0;
          transform: scale(0.92);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes initial-loader-breathe {
        from {
          opacity: 1;
          transform: scale(1);
        }
        to {
          opacity: 0.92;
          transform: scale(1.04);
        }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader-container">
      <div class="initial-loader">
        <div class="initial-loader-logo-wrapper">
          <img src="/logo.png" alt="LM Market" class="initial-loader-logo" />
        </div>
      </div>
    </div>
    <div id="root" style="display: none"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
